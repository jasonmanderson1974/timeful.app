# golangci-lint config (v2 schema — pinned to v2.x in backend-ci.yml).
# History: originally pinned to v1.61.0 with a v1-schema config, but once
# go.mod moved to Go 1.25 that binary (built with go1.23) refused to load the
# project, so the CI step was silently failing behind continue-on-error.
# Upgraded to v2 (config migrated) and made blocking as part of TODO A8.
version: "2"

run:
  timeout: 5m

linters:
  # Default set (errcheck, govet, ineffassign, staticcheck, unused — v2 folds
  # gosimple into staticcheck). These directly catch the A1/A3-class issues
  # (ignored errors, dead assigns) that motivated this task.
  exclusions:
    paths:
      # One-off migration scripts reference outdated models and don't compile
      # (see backend-ci.yml). Keep the linter off them.
      - scripts

issues:
  # Show everything — don't cap per-linter/per-issue.
  max-issues-per-linter: 0
  max-same-issues: 0
