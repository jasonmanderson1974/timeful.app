        invite-only allowlist in sync (the new address is confirmed before
        it is allowlisted).
      parameters:
      - description: The new email address
        in: body
        name: payload
        required: true
        schema:
          properties:
            email:
              type: string
          type: object
      produces:
      - application/json
      responses:
