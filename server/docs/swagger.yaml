definitions:
  bson.M:
    additionalProperties: true
    type: object
  calendar.CalendarEventsWithError:
    properties:
      calendarEvents:
        items:
          $ref: '#/definitions/models.CalendarEvent'
        type: array
      error: {}
    type: object
  commands.Response:
    properties:
      blocks:
        items:
          $ref: '#/definitions/bson.M'
        type: array
      response_type:
        description: ephemeral or in_channel
        type: string
      text:
        type: string
    type: object
  models.AppleCalendarAuth:
    type: object
  models.Attendee:
    properties:
      _id:
        type: string
      declined:
        type: boolean
      email:
        type: string
      eventId:
        type: string
    type: object
  models.BufferTimeOptions:
    properties:
      enabled:
        type: boolean
      time:
        type: integer
    type: object
  models.CalendarAccount:
    properties:
      appleCalendarAuth:
        $ref: '#/definitions/models.AppleCalendarAuth'
      calendarType:
        $ref: '#/definitions/models.CalendarType'
      email:
        description: Email is required for all calendar accounts
        type: string
      enabled:
        type: boolean
      icsCalendarAuth:
        $ref: '#/definitions/models.ICSCalendarAuth'
      oAuth2CalendarAuth:
        $ref: '#/definitions/models.OAuth2CalendarAuth'
      picture:
        type: string
      subCalendars:
        additionalProperties:
          $ref: '#/definitions/models.SubCalendar'
        type: object
    type: object
  models.CalendarEvent:
    properties:
      allDay:
        description: Whether the event is an all day event
        type: boolean
      calendarId:
        type: string
      endDate:
        type: integer
      free:
        description: Whether the user is free during this event
        type: boolean
      id:
        type: string
      startDate:
        type: integer
      summary:
        type: string
    type: object
  models.CalendarOptions:
    properties:
      bufferTime:
        $ref: '#/definitions/models.BufferTimeOptions'
      workingHours:
        $ref: '#/definitions/models.WorkingHoursOptions'
    type: object
  models.CalendarType:
    enum:
    - apple
    - google
    - outlook
    - ics
    type: string
    x-enum-varnames:
    - AppleCalendarType
    - GoogleCalendarType
    - OutlookCalendarType
    - ICSCalendarType
  models.Comment:
    properties:
      _id:
        type: string
      authorName:
        description: Denormalized author display name (guest name, or the account's
          "First Last").
        type: string
      createdAt:
        type: integer
      eventId:
        type: string
      isGuest:
        type: boolean
      text:
        type: string
      updatedAt:
        description: set when edited
        type: integer
      userId:
        description: |-
          UserId is the guest's name OR a signed-in user's id hex — it authorizes
          edit / delete-own. IsGuest disambiguates the two.
        type: string
    type: object
  models.Event:
    properties:
      _id:
        type: string
      attendees:
        description: Attendees for an availability group (fetched from Attendees collection)
        items:
          $ref: '#/definitions/models.Attendee'
        type: array
      blindAvailabilityEnabled:
        description: Whether to enable blind availability
        type: boolean
      calendarEventId:
        type: string
      collectEmails:
        type: boolean
      comments:
        description: Discussion thread (fetched from the comments collection; not
          stored here)
        items:
          $ref: '#/definitions/models.Comment'
        type: array
      dates:
        items:
          type: integer
        type: array
      daysOnly:
        description: Whether to only poll for days, not times
        type: boolean
      description:
        type: string
      duration:
        type: number
      gatheringRecurrence:
        allOf:
        - $ref: '#/definitions/models.GatheringRecurrence'
        description: |-
          Recurrence config for a repeating gathering (C5, paired with ScheduledEvent).
          nil = a one-off gathering.
      gatheringReminder:
        allOf:
        - $ref: '#/definitions/models.GatheringReminder'
        description: Pre-gathering reminder email config/state (paired with ScheduledEvent)
      hasResponded:
        description: Whether the user has responded to the availability group (fetched
          based on whether user is in Attendees)
        type: boolean
      hasSpecificTimes:
        description: Used for specific times for specific dates feature
        type: boolean
      isArchived:
        type: boolean
      isDeleted:
        type: boolean
      isSignUpForm:
        description: Sign up form details
        type: boolean
      location:
        description: |-
          Free-text venue/address for the gathering (C12). Surfaced on the event
          page, in the .ics LOCATION, and in the reminder email.
        type: string
      name:
        type: string
      notificationsEnabled:
        type: boolean
      numResponses:
        description: Used to store the number of responses for the event
        type: integer
      ownerId:
        type: string
      polls:
        description: |-
          Venue / activity polls (C6). Owner-created multiple-choice polls; votes
          live on each option.
        items:
          $ref: '#/definitions/models.Poll'
        type: array
      remindees:
        description: Remindees
        items:
          $ref: '#/definitions/models.Remindee'
        type: array
      responses:
        additionalProperties:
          $ref: '#/definitions/models.Response'
        description: Availability responses - old format for backward compatibility
          (fetched from eventResponses collection)
        type: object
      rsvps:
        additionalProperties:
          $ref: '#/definitions/models.Rsvp'
        description: RSVPs to the confirmed gathering, keyed by guest name / signed-in
          user id
        type: object
      scheduledEvent:
        allOf:
        - $ref: '#/definitions/models.CalendarEvent'
        description: Scheduled event (the confirmed gathering time, once the owner
          locks it in)
      sendEmailAfterXResponses:
        type: integer
      shortId:
        type: string
      signUpBlocks:
        items:
          $ref: '#/definitions/models.SignUpBlock'
        type: array
      signUpResponses:
        additionalProperties:
          $ref: '#/definitions/models.SignUpResponse'
        type: object
      startOnMonday:
        description: Whether to start the event on Monday (as opposed to Sunday, used
          for DOW events)
        type: boolean
      timeIncrement:
        type: integer
      times:
        items:
          type: integer
        type: array
      type:
        $ref: '#/definitions/models.EventType'
      when2meetHref:
        type: string
    type: object
  models.EventType:
    enum:
    - specific_dates
    - dow
    - group
    type: string
    x-enum-varnames:
    - SPECIFIC_DATES
    - DOW
    - GROUP
  models.Folder:
    properties:
      _id:
        type: string
      color:
        type: string
      eventIds:
        items:
          type: string
        type: array
      isDeleted:
        type: boolean
      name:
        type: string
      userId:
        type: string
    type: object
  models.GatheringRecurrence:
    properties:
      frequency:
        $ref: '#/definitions/models.RecurrenceFrequency'
      until:
        description: |-
          Until, when set, is the latest date an occurrence may START on; the series
          stops advancing once the next occurrence would fall after it. nil = no end.
        type: integer
    type: object
  models.GatheringReminder:
    properties:
      enabled:
        type: boolean
      leadTimeHours:
        type: integer
      sentAt:
        description: nil = not yet sent
        type: integer
      timezone:
        description: IANA tz for formatting the email time (e.g. "America/Los_Angeles")
        type: string
    type: object
  models.ICSCalendarAuth:
    properties:
      label:
        type: string
    type: object
  models.OAuth2CalendarAuth:
    type: object
  models.Poll:
    properties:
      _id:
        type: string
      allowMultiple:
        description: AllowMultiple lets a voter pick more than one option (else single-choice).
        type: boolean
      options:
        items:
          $ref: '#/definitions/models.PollOption'
        type: array
      title:
        type: string
    type: object
  models.PollOption:
    properties:
      _id:
        type: string
      label:
        type: string
      votes:
        additionalProperties:
          type: string
        description: |-
          Votes maps a responder key (guest name / signed-in user-id hex) to that
          voter's display name — so a count is len(Votes) and the roster is its values.
        type: object
    type: object
  models.RecurrenceFrequency:
    enum:
    - ""
    - weekly
    - biweekly
    - monthly
    type: string
    x-enum-varnames:
    - RecurrenceNone
    - RecurrenceWeekly
    - RecurrenceBiweekly
    - RecurrenceMonthly
  models.Remindee:
    properties:
      email:
        type: string
      responded:
        type: boolean
    type: object
  models.Response:
    properties:
      availability:
        description: Availability
        items:
          type: integer
        type: array
      calendarOptions:
        $ref: '#/definitions/models.CalendarOptions'
      email:
        type: string
      enabledCalendars:
        additionalProperties:
          items:
            type: string
          type: array
        description: Maps email to an array of sub calendar ids
        type: object
      ifNeeded:
        items:
          type: integer
        type: array
      manualAvailability:
        additionalProperties:
          items:
            type: integer
          type: array
        description: Mapping from the start date of a day to the available times for
          that day
        type: object
      name:
        description: Guest information
        type: string
      useCalendarAvailability:
        description: Calendar availability variables for Availability Groups feature
        type: boolean
      user:
        $ref: '#/definitions/models.User'
      userId:
        description: User information
        type: string
    type: object
  models.Role:
    enum:
    - superAdmin
    - admin
    - member
    - guest
    type: string
    x-enum-varnames:
    - RoleSuperAdmin
    - RoleAdmin
    - RoleMember
    - RoleGuest
  models.Rsvp:
    properties:
      email:
        type: string
      guestCount:
        description: |-
          GuestCount is the number of ADDITIONAL people this responder is bringing
          (a spouse/plus-one), i.e. the headcount for this RSVP is 1 + GuestCount.
          Only meaningful for going/maybe.
        type: integer
      name:
        type: string
      respondedAt:
        type: integer
      status:
        $ref: '#/definitions/models.RsvpStatus'
      userId:
        type: string
    type: object
  models.RsvpStatus:
    enum:
    - going
    - maybe
    - "no"
    type: string
    x-enum-varnames:
    - RsvpGoing
    - RsvpMaybe
    - RsvpNo
  models.SignUpBlock:
    properties:
      _id:
        type: string
      capacity:
        type: integer
      endDate:
        type: integer
      name:
        type: string
      startDate:
        type: integer
    type: object
  models.SignUpResponse:
    properties:
      email:
        type: string
      name:
        description: Guest information
        type: string
      signUpBlockIds:
        description: The IDs of the sign up blocks the user is CONFIRMED for (within
          capacity)
        items:
          type: string
        type: array
      user:
        $ref: '#/definitions/models.User'
      userId:
        description: User information
        type: string
      waitlistBlockIds:
        description: |-
          The IDs of the sign up blocks the user is WAITLISTED for (block was full).
          Assigned server-side by capacity; see assignSignUpBlocks (C9).
        items:
          type: string
        type: array
    type: object
  models.SubCalendar:
    properties:
      enabled:
        type: boolean
      name:
        type: string
    type: object
  models.User:
    properties:
      _id:
        description: Profile info
        type: string
      calendarAccounts:
        additionalProperties:
          $ref: '#/definitions/models.CalendarAccount'
        description: |-
          CalendarAccounts is a mapping from {`email_CALENDARTYPE` => CalendarAccount} that contains all the
          additional accounts the user wants to see google calendar events for
        type: object
      calendarOptions:
        allOf:
        - $ref: '#/definitions/models.CalendarOptions'
        description: Calendar options
      email:
        type: string
      firstName:
        type: string
      hasCustomName:
        description: Whether the user has set a custom name for themselves, i.e. don't
          change their name when they sign in
        type: boolean
      isPremium:
        type: boolean
      lastName:
        type: string
      numEventsCreated:
        type: integer
      phone:
        type: string
      picture:
        type: string
      primaryAccountKey:
        description: The calendarAccountKey of the account the user first signed in
          with
        type: string
      role:
        allOf:
        - $ref: '#/definitions/models.Role'
        description: |-
          Role is the user's access level in the invite-only Fellowship
          (superAdmin/admin/member/guest). Empty ⇒ treated as member. See roles.go.
      stripeCustomerId:
        description: Stripe customer ID
        type: string
      timezoneOffset:
        type: integer
    type: object
  models.WorkingHoursOptions:
    properties:
      enabled:
        type: boolean
      endTime:
        type: number
      startTime:
        type: number
    type: object
  responses.Error:
    properties:
      error: {}
    required:
    - error
    type: object
  routes.CreateFolderResponse:
    properties:
      id:
        type: string
    type: object
  routes.allowlistMember:
    properties:
      _id:
        type: string
      addedAt:
        type: integer
      addedBy:
        type: string
      email:
        type: string
      firstName:
        type: string
      hasAccount:
        type: boolean
      lastName:
        type: string
      phone:
        type: string
      role:
        $ref: '#/definitions/models.Role'
    type: object
host: localhost:3002/api
info:
  contact: {}
  description: This is the API for The Fellowship!
  title: The Fellowship API
  version: "1.0"
paths:
  /admin/allowlist:
    delete:
      consumes:
      - application/json
      parameters:
      - description: Email to remove
        in: body
        name: payload
        required: true
        schema:
          properties:
            email:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Removes an email from the allowlist
      tags:
      - admin
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/routes.allowlistMember'
            type: array
      summary: Lists the invite-only allowlist (with member status + role)
      tags:
      - admin
    post:
      consumes:
      - application/json
      parameters:
      - description: Email to invite and the role to grant
        in: body
        name: payload
        required: true
        schema:
          properties:
            email:
              type: string
            role:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Adds an email to the allowlist (invite a member)
      tags:
      - admin
  /admin/member/role:
    post:
      consumes:
      - application/json
      parameters:
      - description: Member email and new role
        in: body
        name: payload
        required: true
        schema:
          properties:
            email:
              type: string
            role:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Sets a member's role (guest/member/admin)
      tags:
      - admin
  /auth/otp/check-email:
    post:
      consumes:
      - application/json
      parameters:
      - description: Email to check
        in: body
        name: payload
        required: true
        schema:
          properties:
            email:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Checks whether a user with the given email exists
      tags:
      - auth
  /auth/otp/send:
    post:
      consumes:
      - application/json
      parameters:
      - description: Email to send OTP to
        in: body
        name: payload
        required: true
        schema:
          properties:
            email:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Sends an OTP code to the given email
      tags:
      - auth
  /auth/otp/verify:
    post:
      consumes:
      - application/json
      parameters:
      - description: Email, OTP code, and timezone offset
        in: body
        name: payload
        required: true
        schema:
          properties:
            code:
              type: string
            email:
              type: string
            timezoneOffset:
              type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Verifies an OTP code and signs the user in
      tags:
      - auth
  /auth/sign-in:
    post:
      consumes:
      - application/json
      description: Signs user in and sets the access token session variable
      parameters:
      - description: Object containing the Google authorization code, scope, calendar
          type, and the user's timezone offset
        in: body
        name: payload
        required: true
        schema:
          properties:
            calendarType:
              type: string
            code:
              type: string
            scope:
              type: string
            timezoneOffset:
              type: integer
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Signs user in
      tags:
      - auth
  /auth/sign-in-mobile:
    post:
      consumes:
      - application/json
      description: Signs user in and sets the access token session variable
      parameters:
      - description: Object containing the Google authorization code, calendar type,
          and the user's timezone offset
        in: body
        name: payload
        required: true
        schema:
          properties:
            accessToken:
              type: string
            calendarType:
              type: string
            expiresIn:
              type: integer
            idToken:
              type: string
            refreshToken:
              type: string
            scope:
              type: string
            timezoneOffset:
              type: integer
            tokenOrigin:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Signs user in from mobile
      tags:
      - auth
  /auth/sign-out:
    post:
      consumes:
      - application/json
      description: Signs user out and deletes the session
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Signs user out
      tags:
      - auth
  /auth/status:
    get:
      description: Returns a 401 error if user is not signed in, 200 if they are
      responses:
        "200":
          description: OK
        "401":
          description: Error object
          schema:
            $ref: '#/definitions/responses.Error'
      summary: Gets whether the user is signed in or not
      tags:
      - auth
  /events:
    post:
      consumes:
      - application/json
      parameters:
      - description: Object containing info about the event to create
        in: body
        name: payload
        required: true
        schema:
          properties:
            attendees:
              items:
                type: string
              type: array
            blindAvailabilityEnabled:
              type: boolean
            dates:
              items:
                type: string
              type: array
            daysOnly:
              type: boolean
            duration:
              type: number
            isSignUpForm:
              type: boolean
            name:
              type: string
            notificationsEnabled:
              type: boolean
            remindees:
              items:
                type: string
              type: array
            sendEmailAfterXResponses:
              type: integer
            signUpBlocks:
              items:
                $ref: '#/definitions/models.SignUpBlock'
              type: array
            timeIncrement:
              type: integer
            type:
              $ref: '#/definitions/models.EventType'
            when2meetHref:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            properties:
              eventId:
                type: string
            type: object
      summary: Creates a new event
      tags:
      - events
  /events/{eventId}:
    delete:
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Deletes an event based on its id
      tags:
      - events
    get:
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Event'
      summary: Gets an event based on its id
      tags:
      - events
    put:
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      - description: Object containing info about the event to update
        in: body
        name: payload
        required: true
        schema:
          properties:
            attendees:
              items:
                type: string
              type: array
            blindAvailabilityEnabled:
              type: boolean
            dates:
              items:
                type: string
              type: array
            daysOnly:
              type: boolean
            description:
              type: string
            duration:
              type: number
            name:
              type: string
            notificationsEnabled:
              type: boolean
            remindees:
              items:
                type: string
              type: array
            sendEmailAfterXResponses:
              type: integer
            signUpBlocks:
              items:
                $ref: '#/definitions/models.SignUpBlock'
              type: array
            type:
              $ref: '#/definitions/models.EventType'
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Edits an event based on its id
      tags:
      - events
  /events/{eventId}/archive:
    post:
      consumes:
      - application/json
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      - description: Archive status
        in: body
        name: payload
        required: true
        schema:
          properties:
            archive:
              type: boolean
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Archive an event
      tags:
      - events
  /events/{eventId}/calendar-availabilities:
    get:
      consumes:
      - application/json
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      - description: Lower bound for event's start time to filter by
        in: query
        name: timeMin
        required: true
        type: string
      - description: Upper bound for event's end time to filter by
        in: query
        name: timeMax
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              additionalProperties:
                $ref: '#/definitions/calendar.CalendarEventsWithError'
              type: object
            type: object
      summary: Return a map mapping user id to their calendar events that they have
        enabled for the given time range
      tags:
      - events
  /events/{eventId}/comments:
    post:
      consumes:
      - application/json
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      - description: Comment text + author identity
        in: body
        name: payload
        required: true
        schema:
          properties:
            guest:
              type: boolean
            name:
              type: string
            text:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Comment'
      summary: Posts a comment to an event's discussion thread
      tags:
      - events
  /events/{eventId}/comments/{commentId}:
    delete:
      consumes:
      - application/json
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      - description: Comment ID
        in: path
        name: commentId
        required: true
        type: string
      - description: Author identity
        in: body
        name: payload
        required: true
        schema:
          properties:
            guest:
              type: boolean
            name:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Deletes a comment (own, or any when the caller is the event owner)
      tags:
      - events
    put:
      consumes:
      - application/json
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      - description: Comment ID
        in: path
        name: commentId
        required: true
        type: string
      - description: New text + author identity
        in: body
        name: payload
        required: true
        schema:
          properties:
            guest:
              type: boolean
            name:
              type: string
            text:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Edits the caller's own comment
      tags:
      - events
  /events/{eventId}/decline:
    post:
      consumes:
      - application/json
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Decline the current user's invite to the event
      tags:
      - events
  /events/{eventId}/duplicate:
    post:
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      - description: Object containing options for the duplicated event
        in: body
        name: payload
        required: true
        schema:
          properties:
            copyAvailability:
              type: boolean
            eventName:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Duplicate event
      tags:
      - events
  /events/{eventId}/ics:
    get:
      description: Universal "add to calendar" — returns a text/calendar file for
        the gathering's locked-in time. No auth required so any invitee (incl. members
        without a Google account) can add it. 404 if the event has no confirmed gathering
        yet.
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      produces:
      - text/calendar
      responses:
        "200":
          description: OK
      summary: Downloads an .ics calendar file for the event's confirmed gathering
      tags:
      - events
  /events/{eventId}/ids:
    get:
