      responses:
        "200":
          description: OK
          schema:
            properties:
              longId:
                type: string
              shortId:
                type: string
            type: object
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/responses.Error'
      summary: Resolves an event identifier to both short and long IDs
      tags:
      - events
  /events/{eventId}/polls:
    post:
      consumes:
      - application/json
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      - description: Poll title + options
        in: body
        name: payload
        required: true
        schema:
          properties:
            allowMultiple:
              type: boolean
            options:
              items:
                type: string
              type: array
            title:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/models.Poll'
      summary: Creates a venue/activity poll on an event (owner only)
      tags:
      - events
  /events/{eventId}/polls/{pollId}:
    delete:
      consumes:
      - application/json
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      - description: Poll ID
        in: path
        name: pollId
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Deletes a poll from an event (owner only)
      tags:
      - events
  /events/{eventId}/polls/{pollId}/vote:
    post:
      consumes:
      - application/json
      description: Records the caller's chosen option(s) in a poll, replacing any
        previous vote. Open to signed-in users and guests (by name), like RSVP. An
        empty optionIds clears the caller's vote.
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      - description: Poll ID
        in: path
        name: pollId
        required: true
        type: string
      - description: Chosen option ids + voter identity
        in: body
        name: payload
        required: true
        schema:
          properties:
            guest:
              type: boolean
            name:
              type: string
            optionIds:
              items:
                type: string
              type: array
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Casts (or updates) the caller's vote in a poll
      tags:
      - events
  /events/{eventId}/rename-user:
    post:
      consumes:
      - application/json
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      - description: Object containing info about the guest response to rename
        in: body
        name: payload
        required: true
        schema:
          properties:
            newName:
              type: string
            oldName:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
        "400":
          description: Guest name already exists
          schema:
            $ref: '#/definitions/responses.Error'
      summary: Rename a guest response
      tags:
      - events
  /events/{eventId}/responded:
    post:
      consumes:
      - application/json
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      - description: Object containing the user's email
        in: body
        name: payload
        required: true
        schema:
          properties:
            email:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Mark the user as having responded to this event
      tags:
      - events
  /events/{eventId}/response:
    delete:
      consumes:
      - application/json
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      - description: Object containing info about the event response to delete
        in: body
        name: payload
        required: true
        schema:
          properties:
            guest:
              type: boolean
            name:
              type: string
            userId:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Delete the current user's availability
      tags:
      - events
    post:
      consumes:
      - application/json
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      - description: Object containing info about the event response to update
        in: body
        name: payload
        required: true
        schema:
          properties:
            availability:
              items:
                type: string
              type: array
            calendarOptions:
              $ref: '#/definitions/models.CalendarOptions'
            enabledCalendars:
              additionalProperties:
                items:
                  type: string
                type: array
              type: object
            guest:
              type: boolean
            ifNeeded:
              items:
                type: string
              type: array
            manualAvailability:
              additionalProperties:
                items:
                  type: string
                type: array
              type: object
            name:
              type: string
            signUpBlockIds:
              items:
                type: string
              type: array
            useCalendarAvailability:
              type: boolean
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Updates the current user's availability
      tags:
      - events
  /events/{eventId}/responses:
    get:
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      - description: Lower bound for start time to filter availability by
        in: query
        name: timeMin
        required: true
        type: string
      - description: Upper bound for end time to filter availability by
        in: query
        name: timeMax
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              $ref: '#/definitions/models.Response'
            type: object
      summary: Gets responses for an event, filtering availability to be within the
        date ranges
      tags:
      - events
  /events/{eventId}/rsvp:
    delete:
      consumes:
      - application/json
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      - description: Responder identity
        in: body
        name: payload
        required: true
        schema:
          properties:
            guest:
              type: boolean
            name:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Remove the caller's RSVP to a gathering
      tags:
      - events
    post:
      consumes:
      - application/json
      description: Records the caller's attendance for the event's confirmed gathering.
        Requires the event to have a locked-in time (scheduledEvent). Open to signed-in
        users and guests (by name), like availability responses.
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      - description: RSVP status + responder identity
        in: body
        name: payload
        required: true
        schema:
          properties:
            email:
              type: string
            guest:
              type: boolean
            name:
              type: string
            status:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: RSVP to a confirmed gathering (going / maybe / no)
      tags:
      - events
  /events/{eventId}/schedule:
    post:
      consumes:
      - application/json
      description: Persists the chosen gathering time on the event's scheduledEvent
        and, when reminderEnabled, arms a one-time pre-gathering reminder email sent
        reminderLeadTimeHours before the start. Set recurrenceFrequency (weekly|biweekly|monthly)
        to make it a repeating gathering. Pass scheduled=false to cancel.
      parameters:
      - description: Event ID
        in: path
        name: eventId
        required: true
        type: string
      - description: Gathering schedule + reminder + recurrence options
        in: body
        name: payload
        required: true
        schema:
          properties:
            endDate:
              type: string
            recurrenceFrequency:
              type: string
            recurrenceUntil:
              type: string
            reminderEnabled:
              type: boolean
            reminderLeadTimeHours:
              type: integer
            scheduled:
              type: boolean
            startDate:
              type: string
            summary:
              type: string
          type: object
      produces:
      - application/json
      responses:
        "200":
          description: OK
      summary: Confirms (or cancels) a gathering's locked-in time and reminder
      tags:
      - events
