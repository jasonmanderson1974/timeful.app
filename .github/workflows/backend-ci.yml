name: Backend CI

on:
  pull_request:
    paths:
      - "server/**"
      - ".github/workflows/backend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "server/**"
      - ".github/workflows/backend-ci.yml"

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    # Ephemeral Mongo for the db integration tests (./db). Health-gated so the
    # test step doesn't start until it's ready.
    services:
      mongo:
        image: mongo:7
        ports:
          - 27017:27017
        options: >-
          --health-cmd "mongosh --eval 'db.adminCommand({ping:1})'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          cache-dependency-path: server/go.sum

      # Compiles the whole server (main package + all its imports). The one-off
      # migration scripts under server/scripts are standalone main packages that
      # aren't imported, so this doesn't touch them (they reference outdated
      # models and don't compile — see reference-vm-go-test).
      - name: Compile server
        run: go build .

      # Lint as WARNINGS first (continue-on-error) — surfaces issues in the log
      # without blocking merges on the existing backlog (see TODO A8). Tighten to
      # blocking once the backlog is cleared. scripts/ are excluded everywhere
      # because they don't compile.
      - name: go vet
        continue-on-error: true
        run: go vet $(go list ./... | grep -v '/scripts')

      - name: golangci-lint
        continue-on-error: true
        uses: golangci/golangci-lint-action@v6
        with:
          version: v1.61.0
          working-directory: server

      # models/routes/utils need no external services; db runs integration tests
      # against the Mongo service above. services/* still excluded (need creds).
      - name: Run tests
        env:
          MONGODB_URI: mongodb://localhost:27017
        run: go test ./models/ ./routes/ ./utils/ ./db/
