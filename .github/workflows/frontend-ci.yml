name: Frontend CI

on:
  pull_request:
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - ".github/workflows/frontend-ci.yml"

jobs:
  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Lint as WARNINGS first (continue-on-error) — surfaces issues in the log
      # without blocking merges on the existing backlog (see TODO A8). Tighten to
      # blocking once the backlog is cleared.
      - name: Lint
        continue-on-error: true
        run: npm run lint

      - name: Run unit tests
        run: npm run test:unit

      - name: Build frontend
        run: npm run build
