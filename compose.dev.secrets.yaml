# Local-only override: layers real secrets onto the dev stack so OTP login and
# encrypted-data decryption work against a restored prod dump.
#   docker compose -f compose.dev.yaml -f compose.dev.secrets.yaml up -d
# Reads server/.env.dev.local (untracked, chmod 600) — ENCRYPTION_KEY,
# GMAIL_APP_PASSWORD, SCHEJ_EMAIL_ADDRESS copied from the prod VM.
# The env_file's ENCRYPTION_KEY overrides the dummy one in compose.dev.yaml.
services:
  server:
    env_file:
      - ./server/.env.dev.local
